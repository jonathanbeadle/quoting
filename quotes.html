<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Quotes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Saved Quotes</h2>

        <!-- List of Saved Quotes -->
        <ul id="savedQuotesList"></ul>

        <!-- Button to Clear All Quotes -->
        <button class="clearButton" onclick="clearSavedQuotesFromFirebase()">Clear All Quotes</button>

        <!-- Section to Display Quote Details -->
        <div id="quoteDetails" class="hidden">
            <h3>Quote Details</h3>
            <div id="quoteOutput" class="quote-output"></div>
            <button class="backButton" onclick="hideQuoteDetails()">Back to List</button>
        </div>
    </div>

<!-- Replace the Firebase SDK imports with these global CDN links -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>


    <!-- Your custom script.js file -->
    <script type="module" src="script.js"></script>
</body>
</html>
