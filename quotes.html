<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Quotes</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="container">
        <h2>Saved Quotes</h2>
        <ul id="savedQuotesList"></ul>
        <div id="quoteOutput" class="email-output"></div>
        <button id="clearQuotesButton" onclick="clearSavedQuotesFromFirebase()">Clear All Quotes</button>
        <button id="backButton" onclick="window.location.href='index.html'">Back to Quotation Tool</button>
    </div>

    <!-- Firebase SDKs (imported first) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
