<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotation Tool</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Company Logo" class="logo">
        <h2>Quotation Tool</h2>
        <form id="quoteForm" onsubmit="return validateForm();">
            <div class="form-column">
                <label for="make">Vehicle Make:</label>
                <input type="text" id="make" name="make" required>

                <label for="model">Vehicle Model:</label>
                <input type="text" id="model" name="model" required>

                <label for="funding_type">Funding Type:</label>
                <select id="funding_type" name="funding_type" required>
                    <option value="" disabled selected>Select Funding Type</option>
                    <option value="finance lease">Finance Lease</option>
                    <option value="operating lease">Operating Lease</option>
                    <option value="business contract hire">Business Contract Hire</option>
                    <option value="outright purchase">Outright Purchase</option>
                </select>

                <label for="contract_length">Contract Length (months):</label>
                <input type="number" id="contract_length" name="contract_length" required>

                <label for="annual_mileage">Annual Mileage:</label>
                <input type="number" id="annual_mileage" name="annual_mileage" required>

                <label for="payment_profile">Payment Profile:</label>
                <input type="text" id="payment_profile" name="payment_profile" required">
            </div>
            <div class="form-column">
                <label for="maintenance">Maintenance Included:</label>
                <select id="maintenance" name="maintenance" required>
                    <option value="" disabled selected>Select Maintenance</option>
                    <option value="Not Included">Not Included</option>
                    <option value="Included">Included</option>
                </select>

                <label for="monthly_cost">Monthly Cost (£):</label>
                <input type="number" id="monthly_cost" name="monthly_cost" required>

                <label for="initial_rental">Initial Rental (£):</label>
                <input type="number" id="initial_rental" name="initial_rental" required>

                <label for="excess_mileage_cost">Excess Mileage Cost (p/mile):</label>
                <input type="text" id="excess_mileage_cost" name="excess_mileage_cost" required>

                <div id="salesPriceField" style="display: none;">
                    <label for="sales_price">Sales Price (£):</label>
                    <input type="number" id="sales_price" name="sales_price">
                </div>

                <label for="processing_fee">Processing Fee (£):</label>
                <input type="text" id="processing_fee" name="processing_fee" required>
            </div>
            <button type="button" onclick="if (validateForm()) generateQuote();">Generate Quote</button>
        </form>

        <div id="outputSection" class="hidden">
            <div id="emailOutput" class="email-output"></div>
            <button id="copyButton" onclick="copyToClipboard()">Copy to Clipboard</button>
            <button id="newQuoteButton" onclick="resetForm()">New Quote</button>
            <button id="saveQuoteButton" onclick="saveQuoteToFirebase()">Save Quote to Cloud</button>
        </div>

        <a href="quotes.html">View Saved Quotes</a>
    </div>

    <!-- Firebase SDKs (include these before your script.js) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Your custom script.js file -->
    <script src="script.js"></script>
</body>
</html>
